# readiness-as-code — GitLab CI template
#
# Include in your .gitlab-ci.yml:
#   include:
#     - local: 'templates/gitlab-ci.yml'

readiness-scan:
  stage: test
  image: python:3.11-slim
  script:
    - pip install readiness-as-code
    - ready scan --verbose --baseline .readiness/review-baseline.json
  artifacts:
    paths:
      - .readiness/review-baseline.json
    expire_in: 90 days
    when: always
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
