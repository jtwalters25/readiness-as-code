<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <style>
      .layer-label { font-size: 11px; font-weight: 600; fill: #94a3b8; letter-spacing: 0.08em; text-transform: uppercase; }
      .box-title   { font-size: 13px; font-weight: 700; fill: #f1f5f9; }
      .box-sub     { font-size: 11px; fill: #94a3b8; }
      .arrow-label { font-size: 10px; fill: #64748b; }
      .section-bg  { rx: 8; ry: 8; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a855f7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#0f172a" rx="12"/>

  <!-- ─────────────────────────────────────────────── -->
  <!-- ROW 1: AUTHORING LAYER -->
  <!-- ─────────────────────────────────────────────── -->
  <text x="30" y="34" class="layer-label">Authoring</text>

  <!-- Guideline Doc -->
  <rect x="30" y="44" width="140" height="64" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="100" y="68" class="box-title" text-anchor="middle">Guideline Doc</text>
  <text x="100" y="86" class="box-sub" text-anchor="middle">ops-review.md</text>
  <text x="100" y="100" class="box-sub" text-anchor="middle">or any policy doc</text>

  <!-- AI Skill arrow -->
  <line x1="170" y1="76" x2="210" y2="76" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- AI Skill box -->
  <rect x="210" y="44" width="150" height="64" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="285" y="68" class="box-title" text-anchor="middle">AI Skill</text>
  <text x="285" y="86" class="box-sub" text-anchor="middle">Claude · ChatGPT</text>
  <text x="285" y="100" class="box-sub" text-anchor="middle">Copilot · Cursor</text>

  <!-- arrow to definitions -->
  <line x1="360" y1="76" x2="400" y2="76" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="380" y="70" class="arrow-label" text-anchor="middle">proposes</text>

  <!-- Human Review -->
  <rect x="400" y="44" width="130" height="64" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="465" y="68" class="box-title" text-anchor="middle">Human Review</text>
  <text x="465" y="86" class="box-sub" text-anchor="middle">approve / edit /</text>
  <text x="465" y="100" class="box-sub" text-anchor="middle">reject checkpoints</text>

  <!-- arrow to storage -->
  <line x1="530" y1="76" x2="570" y2="76" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="550" y="70" class="arrow-label" text-anchor="middle">commits</text>

  <!-- checkpoint-definitions.json -->
  <rect x="570" y="44" width="160" height="64" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="650" y="65" class="box-title" text-anchor="middle">checkpoint-</text>
  <text x="650" y="81" class="box-title" text-anchor="middle">definitions.json</text>
  <text x="650" y="99" class="box-sub" text-anchor="middle">.readiness/ in repo</text>

  <!-- ─────────────────────────────────────────────── -->
  <!-- ROW 2: REPO STORAGE -->
  <!-- ─────────────────────────────────────────────── -->
  <text x="30" y="144" class="layer-label">Repo State  (.readiness/)</text>

  <rect x="30" y="154" width="800" height="72" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>

  <!-- 4 files -->
  <rect x="48" y="166" width="170" height="48" rx="6" fill="#0f172a" stroke="#1d4ed8" stroke-width="1"/>
  <text x="133" y="186" class="box-title" text-anchor="middle" font-size="12">checkpoint-definitions</text>
  <text x="133" y="202" class="box-sub" text-anchor="middle">what to check</text>

  <rect x="236" y="166" width="150" height="48" rx="6" fill="#0f172a" stroke="#1d4ed8" stroke-width="1"/>
  <text x="311" y="186" class="box-title" text-anchor="middle" font-size="12">exceptions.json</text>
  <text x="311" y="202" class="box-sub" text-anchor="middle">accepted risks + expiry</text>

  <rect x="404" y="166" width="165" height="48" rx="6" fill="#0f172a" stroke="#1d4ed8" stroke-width="1"/>
  <text x="486" y="186" class="box-title" text-anchor="middle" font-size="12">external-evidence.json</text>
  <text x="486" y="202" class="box-sub" text-anchor="middle">human attestations</text>

  <rect x="587" y="166" width="165" height="48" rx="6" fill="#0f172a" stroke="#1d4ed8" stroke-width="1"/>
  <text x="669" y="186" class="box-title" text-anchor="middle" font-size="12">review-baseline.json</text>
  <text x="669" y="202" class="box-sub" text-anchor="middle">snapshot + audit trail</text>

  <!-- ─────────────────────────────────────────────── -->
  <!-- ROW 3: SCAN ENGINE -->
  <!-- ─────────────────────────────────────────────── -->
  <text x="30" y="258" class="layer-label">Scan Engine</text>

  <!-- Arrows from storage down -->
  <line x1="450" y1="226" x2="450" y2="268" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="30" y="268" width="840" height="82" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>

  <!-- ready scan CLI -->
  <rect x="48" y="280" width="120" height="58" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="108" y="302" class="box-title" text-anchor="middle">ready scan</text>
  <text x="108" y="318" class="box-sub" text-anchor="middle">CLI / CI / MCP</text>
  <text x="108" y="332" class="box-sub" text-anchor="middle">ready-mcp</text>

  <!-- Verification methods -->
  <rect x="196" y="280" width="290" height="58" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="341" y="300" class="box-title" text-anchor="middle">validators.py</text>
  <text x="341" y="318" class="box-sub" text-anchor="middle">file_exists · glob · grep · json_path</text>
  <text x="341" y="332" class="box-sub" text-anchor="middle">external_attestation · hybrid</text>

  <!-- confidence -->
  <rect x="504" y="280" width="180" height="58" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="594" y="300" class="box-title" text-anchor="middle">Confidence</text>
  <text x="594" y="318" class="box-sub" text-anchor="middle">verified · likely</text>
  <text x="594" y="332" class="box-sub" text-anchor="middle">inconclusive → review</text>

  <!-- status -->
  <rect x="702" y="280" width="152" height="58" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="778" y="300" class="box-title" text-anchor="middle">Status</text>
  <text x="778" y="318" class="box-sub" text-anchor="middle">pass · fail · skip</text>
  <text x="778" y="332" class="box-sub" text-anchor="middle">exception · expired</text>

  <!-- ─────────────────────────────────────────────── -->
  <!-- ROW 4: OUTPUTS — 4 columns -->
  <!-- ─────────────────────────────────────────────── -->
  <text x="30" y="386" class="layer-label">Outputs &amp; Integrations</text>

  <!-- down arrow from engine -->
  <line x1="450" y1="350" x2="450" y2="396" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Col 1: Terminal / CI -->
  <rect x="30" y="396" width="192" height="150" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="126" y="418" class="box-title" text-anchor="middle" fill="#22c55e">CI / Terminal</text>
  <text x="126" y="438" class="box-sub" text-anchor="middle">🔴 RED — cannot ship</text>
  <text x="126" y="454" class="box-sub" text-anchor="middle">🟡 YELLOW — fix soon</text>
  <text x="126" y="470" class="box-sub" text-anchor="middle">🟢 passing</text>
  <line x1="50" y1="480" x2="202" y2="480" stroke="#1e293b" stroke-width="1"/>
  <text x="126" y="498" class="box-sub" text-anchor="middle">GitHub Actions</text>
  <text x="126" y="514" class="box-sub" text-anchor="middle">Azure Pipelines</text>
  <text x="126" y="530" class="box-sub" text-anchor="middle">GitLab CI</text>

  <!-- Col 2: Work Items -->
  <rect x="240" y="396" width="192" height="150" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="336" y="418" class="box-title" text-anchor="middle" fill="#f59e0b">Work Items</text>
  <text x="336" y="438" class="box-sub" text-anchor="middle">ready items --create</text>
  <text x="336" y="454" class="box-sub" text-anchor="middle">ready items --verify</text>
  <line x1="258" y1="468" x2="414" y2="468" stroke="#1e293b" stroke-width="1"/>
  <text x="336" y="486" class="box-sub" text-anchor="middle">GitHub Issues</text>
  <text x="336" y="502" class="box-sub" text-anchor="middle">Azure DevOps</text>
  <text x="336" y="518" class="box-sub" text-anchor="middle">Jira</text>
  <text x="336" y="534" class="box-sub" text-anchor="middle">regression · stale detection</text>

  <!-- Col 3: AI Tools -->
  <rect x="450" y="396" width="192" height="150" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="546" y="418" class="box-title" text-anchor="middle" fill="#a855f7">AI Tools  (MCP)</text>
  <text x="546" y="438" class="box-sub" text-anchor="middle">scan_repo</text>
  <text x="546" y="454" class="box-sub" text-anchor="middle">list_checkpoints</text>
  <text x="546" y="470" class="box-sub" text-anchor="middle">explain_checkpoint</text>
  <line x1="468" y1="480" x2="624" y2="480" stroke="#1e293b" stroke-width="1"/>
  <text x="546" y="498" class="box-sub" text-anchor="middle">Claude Desktop · Cursor</text>
  <text x="546" y="514" class="box-sub" text-anchor="middle">VS Code · Windsurf</text>
  <text x="546" y="530" class="box-sub" text-anchor="middle">any MCP-compatible client</text>

  <!-- Col 4: Aggregate -->
  <rect x="660" y="396" width="210" height="150" rx="8" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="765" y="418" class="box-title" text-anchor="middle" fill="#06b6d4">Cross-Repo Heatmap</text>
  <text x="765" y="438" class="box-sub" text-anchor="middle">ready aggregate</text>
  <text x="765" y="454" class="box-sub" text-anchor="middle">aggregate_baselines (MCP)</text>
  <line x1="678" y1="468" x2="852" y2="468" stroke="#1e293b" stroke-width="1"/>
  <text x="765" y="488" class="box-sub" text-anchor="middle">team gap → platform gap</text>
  <text x="765" y="506" class="box-sub" text-anchor="middle">systemic pattern detection</text>
  <text x="765" y="522" class="box-sub" text-anchor="middle">org-level readiness view</text>

  <!-- ─────────────────────────────────────────────── -->
  <!-- Notification row -->
  <!-- ─────────────────────────────────────────────── -->
  <text x="30" y="572" class="layer-label">Notifications</text>
  <rect x="30" y="582" width="192" height="30" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="126" y="602" class="box-sub" text-anchor="middle">Slack · Microsoft Teams</text>

  <!-- small arrow from CI to notifications -->
  <line x1="126" y1="546" x2="126" y2="580" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow-green)"/>
</svg>
