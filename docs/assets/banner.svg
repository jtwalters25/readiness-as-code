<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
  </defs>
  <rect width="600" height="120" rx="12" fill="url(#bg)"/>
  <rect x="0" y="108" width="600" height="4" rx="0" fill="url(#accent)" opacity="0.6"/>

  <!-- Checkmark icon -->
  <circle cx="60" cy="60" r="22" fill="none" stroke="#22d3ee" stroke-width="2.5" opacity="0.9"/>
  <polyline points="49,60 57,68 72,52" fill="none" stroke="#22d3ee" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Title -->
  <text x="100" y="52" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="28" font-weight="700" fill="#f1f5f9" letter-spacing="-0.5">ready</text>

  <!-- Subtitle -->
  <text x="100" y="78" font-family="'SF Pro Display','Segoe UI','Helvetica Neue',sans-serif" font-size="14" fill="#94a3b8" letter-spacing="0.3">Know before you ship.</text>

  <!-- Decorative dots -->
  <circle cx="530" cy="35" r="3" fill="#22d3ee" opacity="0.3"/>
  <circle cx="545" cy="28" r="2" fill="#818cf8" opacity="0.3"/>
  <circle cx="555" cy="42" r="2.5" fill="#22d3ee" opacity="0.2"/>
  <circle cx="520" cy="45" r="2" fill="#818cf8" opacity="0.25"/>
</svg>
