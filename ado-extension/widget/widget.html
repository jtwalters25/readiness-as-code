<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Readiness Score</title>
  <script src="../node_modules/vss-web-extension-sdk/lib/VSS.SDK.min.js"></script>
  <script src="widget.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", sans-serif;
      background: #fff;
      color: #323130;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .widget {
      width: 100%;
      padding: 14px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    /* ── Header row ── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .brand {
      font-size: 13px;
      font-weight: 600;
      color: #605e5c;
      letter-spacing: 0.02em;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #d4d4d4;
      flex-shrink: 0;
    }
    .dot.green  { background: #107c10; }
    .dot.yellow { background: #ffb900; }
    .dot.red    { background: #c50f1f; }

    /* ── Score ── */
    .score-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-top: 2px;
    }
    .score {
      font-size: 40px;
      font-weight: 700;
      line-height: 1;
      color: #201f1e;
    }
    .score-pct {
      font-size: 18px;
      font-weight: 400;
      color: #605e5c;
    }

    /* ── Meta row ── */
    .meta {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: #605e5c;
    }
    .drift {
      font-weight: 600;
    }
    .drift.up   { color: #107c10; }
    .drift.down { color: #c50f1f; }
    .blocking {
      color: #c50f1f;
      font-weight: 600;
    }

    /* ── Sparkline ── */
    .sparkline-wrap {
      margin-top: 4px;
    }
    .sparkline {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 24px;
    }
    .spark-bar {
      flex: 1;
      background: #c8c6c4;
      border-radius: 2px 2px 0 0;
      min-height: 2px;
      transition: background 0.2s;
    }
    .spark-bar.latest { background: #0078d4; }
    .spark-bar.green  { background: #107c10; }
    .spark-bar.yellow { background: #ffb900; }
    .spark-bar.red    { background: #c50f1f; }

    /* ── Footer ── */
    .footer {
      font-size: 11px;
      color: #a19f9d;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Loading / error ── */
    .loading { color: #605e5c; font-size: 13px; text-align: center; }
    .error   { color: #c50f1f; font-size: 12px; }
  </style>
</head>
<body>
  <div class="widget" id="widget-root">
    <div class="header">
      <span class="brand">ready</span>
      <span class="dot" id="status-dot"></span>
    </div>
    <div class="loading" id="loading-msg">Loading...</div>
    <div id="content" style="display:none; flex-direction:column; gap:4px;">
      <div class="score-row">
        <span class="score" id="score-value">--</span>
        <span class="score-pct">%</span>
      </div>
      <div class="meta">
        <span class="drift" id="drift-value"></span>
        <span class="blocking" id="blocking-value"></span>
      </div>
      <div class="sparkline-wrap">
        <div class="sparkline" id="sparkline"></div>
      </div>
      <div class="footer" id="footer-text"></div>
    </div>
    <div class="error" id="error-msg" style="display:none;"></div>
  </div>
</body>
</html>
